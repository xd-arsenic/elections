<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    background: #1a1210; font-family: 'Inter', sans-serif; color: #e8e0d6; position: relative;
  }
  body::after {
    content:''; position:absolute; inset:0;
    background: repeating-conic-gradient(rgba(255,255,255,.015) 0% 25%, transparent 0% 50%) 0 0/4px 4px;
    pointer-events:none;
  }
  .top-line { position:absolute; top:0; left:0; right:0; height:4px; background:transparent; z-index:20; }
  .corner { position:absolute; width:36px; height:36px; border-color:rgba(198,40,40,.22); border-style:solid; z-index:20; }
  .corner.tl { top:18px; left:18px; border-width:3px 0 0 3px; }
  .corner.tr { top:18px; right:18px; border-width:3px 3px 0 0; }
  .corner.bl { bottom:18px; left:18px; border-width:0 0 3px 3px; }
  .corner.br { bottom:18px; right:18px; border-width:0 3px 3px 0; }

  .layout {
    height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:24px 36px 88px; text-align:center; position:relative; z-index:2;
  }

  h1 {
    font-family:'Special Elite',cursive; font-size:158px; line-height:1.02;
    color:#c62828; margin-bottom:14px;
  }

  .or {
    font-family:'Special Elite',cursive; font-size:54px; color:#4a3f35;
    margin:8px 0 12px;
  }

  .recall {
    font-family:'Special Elite',cursive; font-size:124px; line-height:1.02;
    color:#f5f0eb; margin-bottom:40px;
    white-space:nowrap;
  }

  .underline {
    width:280px; height:4px; background:#c62828; margin:0 auto 40px;
  }

  .why {
    font-size:31px; color:#8a7d72; line-height:1.45; max-width:960px; margin-bottom:40px;
  }
  .why strong { color:#f5f0eb; }

  .link-box {
    font-family:'JetBrains Mono',monospace; font-size:30px; letter-spacing:3px;
    text-transform:uppercase; color:#c9a96e; padding:28px 56px;
    border:1px solid rgba(201,169,110,.35); background:rgba(201,169,110,.06);
  }

  .page-num { position:absolute; bottom:36px; left:44px; font-family:'JetBrains Mono',monospace; font-size:19px; color:#4a3f35; z-index:20; }
  .swipe { position:absolute; bottom:36px; right:44px; font-family:'JetBrains Mono',monospace; font-size:19px; color:#6b5e52; display:flex; align-items:center; gap:10px; z-index:20; letter-spacing:2px; }
</style>
</head>
<body>
<div class="top-line"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="layout">
  <h1>Step down.</h1>
  <div class="or">or</div>
  <div class="recall">We will recall.</div>

  <div class="underline"></div>

  <p class="why">This undermines what <strong>every student</strong> voted for. Ricardo Miranda must withdraw his candidacy or we will initiate a formal recall.</p>

  <div class="link-box">Full evidence at link in bio</div>
</div>

<div class="page-num">04 / 04</div>
<div class="swipe">SWIPE <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
</body>
</html>
