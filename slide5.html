<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    background: #1a1210; font-family: 'Inter', sans-serif; color: #e8e0d6; position: relative;
  }
  body::before {
    content:''; position:absolute; inset:0;
    background:
      linear-gradient(rgba(26,18,16,0.96), rgba(26,18,16,0.99)),
      url('kim.jpg') center/cover no-repeat;
    filter: grayscale(0.4) contrast(1.05);
    z-index:0;
    pointer-events:none;
  }
  body::after {
    content:''; position:absolute; inset:0;
    background: repeating-conic-gradient(rgba(255,255,255,.015) 0% 25%, transparent 0% 50%) 0 0/4px 4px;
    pointer-events:none;
  }
  .corner { position:absolute; width:36px; height:36px; border-color:rgba(198,40,40,.22); border-style:solid; z-index:20; }
  .corner.tl { top:18px; left:18px; border-width:3px 0 0 3px; }
  .corner.tr { top:18px; right:18px; border-width:3px 3px 0 0; }
  .corner.bl { bottom:18px; left:18px; border-width:0 0 3px 3px; }
  .corner.br { bottom:18px; right:18px; border-width:0 3px 3px 0; }

  .layout {
    height:100%; display:flex; flex-direction:column; justify-content:center;
    padding:56px 64px 80px; position:relative; z-index:2;
  }
  .layout h1,
  .layout .label,
  .layout .entry-name,
  .layout .entry-pct,
  .layout .entry-sub,
  .layout .punchline-sub {
    text-shadow:
      0 0 18px rgba(0,0,0,.85),
      0 0 38px rgba(0,0,0,.75),
      0 2px 6px rgba(0,0,0,.9);
  }

  .label {
    font-family:'JetBrains Mono',monospace; font-size:22px; letter-spacing:5px;
    text-transform:uppercase; color:#c62828; margin-bottom:20px; text-align:center;
  }

  h1 {
    font-family:'Special Elite',cursive; font-size:76px; line-height:1.08;
    color:#f5f0eb; margin-bottom:48px; text-align:center;
  }

  /* Comparison entry */
  .entry {
    margin-bottom:40px;
  }

  .entry-head {
    display:flex; justify-content:space-between; align-items:baseline;
    margin-bottom:12px;
  }

  .entry-name {
    font-weight:900; font-size:40px; color:#f5f0eb; line-height:1.1;
  }

  .entry-pct {
    font-family:'Special Elite',cursive; font-size:80px;
    line-height:1;
  }

  .entry-pct.nk { color:#784b84; }
  .entry-pct.asucsd { color:#d67329; }

  .entry-sub {
    font-size:22px; color:#8a7d72; margin-bottom:14px;
  }

  .bar-track {
    width:100%; height:52px; background:rgba(255,255,255,.03); overflow:hidden;
  }
  .bar-fill { height:100%; }
  .fill-nk { background:#784b84; width:99.93%; }
  .fill-asucsd { background:#d67329; width:100%; }

  /* punchline */
  .punchline {
    margin-top:32px;
    padding:40px 40px 42px;
    background:rgba(198,40,40,.1);
    border:1px solid rgba(198,40,40,.3);
    border-radius:14px;
    text-align:center;
  }

  .punchline-big {
    font-family:'Special Elite',cursive;
    font-size:62px;
    color:#c62828;
    line-height:1.15;
    margin-bottom:14px;
    text-shadow:
      0 0 18px rgba(0,0,0,.85),
      0 0 38px rgba(0,0,0,.75),
      0 2px 6px rgba(0,0,0,.9);
  }

  .punchline-sub {
    font-size:26px;
    color:#d8cfc2;
    line-height:1.5;
  }

  .punchline-sub strong { color:#f5f0eb; }

  .page-num { position:absolute; bottom:36px; left:44px; font-family:'JetBrains Mono',monospace; font-size:19px; color:#4a3f35; z-index:20; }
</style>
</head>
<body>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<div class="layout">
  <h1>North Korea ran a more<br>competitive election.</h1>

  <div class="entry">
    <div class="entry-head">
      <div class="entry-name">Kim Jong Un</div>
      <div class="entry-pct nk">99.93%</div>
    </div>
    <div class="entry-sub">North Korea &mdash; 2014 Supreme People's Assembly</div>
    <div class="bar-track"><div class="bar-fill fill-nk"></div></div>
  </div>

  <div class="entry">
    <div class="entry-head">
      <div class="entry-name">'Certified' Candidate</div>
      <div class="entry-pct asucsd">100%</div>
    </div>
    <div class="entry-sub">ASUCSD &mdash; 2026 External Affairs VP</div>
    <div class="bar-track"><div class="bar-fill fill-asucsd"></div></div>
  </div>

  <div class="punchline">
    <div class="punchline-big">0.07% difference.</div>
    <p class="punchline-sub">One is a dictatorship.<br>The other is <strong>your student government.</strong></p>
  </div>
</div>

</body>
</html>
