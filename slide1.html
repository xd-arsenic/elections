<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    width: 1080px; height: 1350px; overflow: hidden;
    background: #1a1210; font-family: 'Inter', sans-serif; color: #e8e0d6; position: relative;
  }
  body::after {
    content:''; position:absolute; inset:0;
    background: repeating-conic-gradient(rgba(255,255,255,.015) 0% 25%, transparent 0% 50%) 0 0/4px 4px;
    pointer-events:none;
  }
  .top-line { position:absolute; top:0; left:0; right:0; height:4px; background:transparent; z-index:20; }
  .corner { position:absolute; width:36px; height:36px; border-color:rgba(198,40,40,.22); border-style:solid; z-index:20; }
  .corner.tl { top:18px; left:18px; border-width:3px 0 0 3px; }
  .corner.tr { top:18px; right:18px; border-width:3px 3px 0 0; }
  .corner.bl { bottom:18px; left:18px; border-width:0 0 3px 3px; }
  .corner.br { bottom:18px; right:18px; border-width:0 3px 3px 0; }

  .layout {
    height:100%; display:flex; flex-direction:column; justify-content:center; align-items:center;
    padding:56px 56px 72px; text-align:center; position:relative; z-index:2;
  }

  .badge {
    font-family:'JetBrains Mono',monospace; font-size:32px; letter-spacing:5px;
    text-transform:uppercase; color:#c62828;
    border:1px solid rgba(198,40,40,.4); padding:14px 32px;
    background:rgba(198,40,40,.06); margin-bottom:44px;
  }
  .badge .badge-em {
    font-size:1.22em; color:#f5f0eb; letter-spacing:0.06em;
  }

  h1 {
    font-family:'Special Elite',cursive; font-size:128px; line-height:1.05;
    color:#f5f0eb; margin-bottom:36px;
  }
  h1 .red {
    color:#c62828; display:block; font-size:140px;
    text-decoration:underline; text-decoration-color:rgba(198,40,40,.4); text-underline-offset:12px;
  }

  .sub {
    font-size:38px; color:#8a7d72; max-width:860px; line-height:1.5;
  }

  .stats {
    display:flex; gap:76px; margin-top:48px;
  }
  .stat-num {
    font-family:'Special Elite',cursive; font-size:130px; color:#c62828;
  }
  .stat-label {
    font-family:'Inter',sans-serif; font-size:28px; font-weight:700; letter-spacing:0.04em;
    text-transform:uppercase; color:#d8cfc2; margin-top:10px; line-height:1.25;
  }

  .page-num { position:absolute; bottom:36px; left:44px; font-family:'JetBrains Mono',monospace; font-size:19px; color:#4a3f35; z-index:20; }
  .swipe { position:absolute; bottom:36px; right:44px; font-family:'JetBrains Mono',monospace; font-size:19px; color:#6b5e52; display:flex; align-items:center; gap:10px; z-index:20; letter-spacing:2px; }
</style>
</head>
<body>
<div class="top-line"></div>
<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
<div class="layout">
  <div class="badge"> 2026 AS UCSD Elections <span class="badge-em"></span></div>
  <br><br>
  <h1>Your vote was<span class="red">thrown out.</span></h1>
  <p class="sub">5,500 students voted. The last-place candidate was declared the winner.</p>
  <br><br><br><br>
  <div class="stats">
    <div><div class="stat-num" style="color:#c9a96e">72%</div><div class="stat-label">Voters overruled</div></div>
    <div><div class="stat-num">27%</div><div class="stat-label">Winner's real vote</div></div>
  </div>
</div>
<div class="page-num">01 / 04</div>
<div class="swipe">SWIPE <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
</body>
</html>
